<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaleoLab Científico</title>

    <!-- Bootstrap 5 (apenas grid e utilitários) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <!-- Bibliotecas externas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <!-- CSS principal -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- HEADER -->
    <header class="main-header">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div class="logo">
                <i class="bi bi-bug"></i>
                <span>PaleoLab</span>
                <small>Científico</small>
            </div>
            <div class="conquista-badge" id="conquista-badge">
                <i class="bi bi-trophy-fill"></i>
                <span id="conquista-count">0</span>
            </div>
        </div>
    </header>

    <!-- NAVEGAÇÃO POR ABAS (menu superior) -->
    <nav class="tab-nav" id="tab-nav">
        <div class="nav-scroll">
            <button class="tab-btn active" data-tab="escala"><i class="bi bi-rulers"></i> Escala</button>
            <button class="tab-btn" data-tab="deriva"><i class="bi bi-globe2"></i> Deriva</button>
            <button class="tab-btn" data-tab="extincao"><i class="bi bi-biohazard"></i> K‑Pg</button>
            <button class="tab-btn" data-tab="icnofosseis"><i class="bi bi-footprints"></i> Icnofósseis</button>
            <button class="tab-btn" data-tab="fosseis"><i class="bi bi-bone"></i> Fósseis</button>
            <button class="tab-btn" data-tab="massa"><i class="bi bi-weight-scale"></i> Massa</button>
            <button class="tab-btn" data-tab="quiz"><i class="bi bi-question-circle"></i> Quiz</button>
            <button class="tab-btn" data-tab="tempo"><i class="bi bi-clock-history"></i> Tempo</button>
            <button class="tab-btn" data-tab="clima"><i class="bi bi-cloud-sun"></i> Clima</button>
            <button class="tab-btn" data-tab="conquistas"><i class="bi bi-trophy"></i> Conquistas</button>
            <button class="tab-btn" data-tab="pdf"><i class="bi bi-file-pdf"></i> PDF</button>
            <button class="tab-btn" data-tab="arvore"><i class="bi bi-diagram-3"></i> Árvore</button>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content">
        <div class="container-fluid">
            <!-- Cada aba é uma seção -->
            <section id="tab-escala" class="tab-panel active"></section>
            <section id="tab-deriva" class="tab-panel"></section>
            <section id="tab-extincao" class="tab-panel"></section>
            <section id="tab-icnofosseis" class="tab-panel"></section>
            <section id="tab-fosseis" class="tab-panel"></section>
            <section id="tab-massa" class="tab-panel"></section>
            <section id="tab-quiz" class="tab-panel"></section>
            <section id="tab-tempo" class="tab-panel"></section>
            <section id="tab-clima" class="tab-panel"></section>
            <section id="tab-conquistas" class="tab-panel"></section>
            <section id="tab-pdf" class="tab-panel"></section>
            <section id="tab-arvore" class="tab-panel"></section>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script>
        // Controle de abas (sem Bootstrap JS)
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tabId = this.dataset.tab;
                // Remove active de todos os botões e painéis
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                // Ativa o selecionado
                this.classList.add('active');
                document.getElementById('tab-' + tabId).classList.add('active');
                // Dispara evento para possíveis recarregamentos
                window.dispatchEvent(new CustomEvent('tabchange', { detail: { tab: tabId } }));
            });
        });
        // Ativa a primeira aba por padrão
        document.querySelector('.tab-btn.active')?.click();
    </script>

    <script src="js/data.js" defer></script>
    <script src="js/utils.js" defer></script>
    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
</body>
</html>
