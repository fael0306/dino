<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaleoLab Científico – Web</title>

    <!-- Bootstrap 5 + Ícones -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
    <!-- Leaflet (mapas) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
    <!-- vis.js (árvore evolutiva) -->
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js" defer></script>
    <!-- jsPDF (exportar PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <!-- Nosso CSS e JS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Barra de navegação superior -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="bi bi-bug"></i> PaleoLab Científico</a>
            <span class="navbar-text text-light" id="conquista-badge">
                <i class="bi bi-trophy"></i> <span id="conquista-count">0</span>
            </span>
        </div>
    </nav>

    <!-- Abas (tabs) – controle manual, sem Bootstrap JS -->
    <div class="container-fluid mt-3">
        <ul class="nav nav-pills nav-fill flex-wrap" id="paleo-tabs">
            <li class="nav-item"><button class="nav-link active" onclick="trocarAba('escala', this)">📏 Escala Real</button></li>
            <li class="nav-item"><button class="nav-link" onclick="trocarAba('deriva', this)">🗺️ Deriva Continental</button></li>
            <li class="nav-item"><button class="nav-link" onclick="trocarAba('extincao', this)">🦠 Extinção K‑Pg</button></li>
            <li class="nav-item"><button class="nav-link" onclick="trocarAba('icnofosseis', this)">👣 Icnofósseis</button></li>
            <li class="nav-item"><button class="nav-link" onclick="trocarAba('fosseis', this)">🦴 Fósseis Reais</button></li>
            <li class="nav-item"><button class="nav-link" onclick="trocarAba('massa', this)">⚖️ Massa Corporal</button></li>
            <li class="nav-item"><button class="nav-link" onclick="trocarAba('quiz', this)">📝 Quiz</button></li>
            <li class="nav-item"><button class="nav-link" onclick="trocarAba('tempo', this)">⏳ Linha do Tempo</button></li>
            <li class="nav-item"><button class="nav-link" onclick="trocarAba('clima', this)">🌍 Clima Mesozóico</button></li>
            <li class="nav-item"><button class="nav-link" onclick="trocarAba('conquistas', this)">🏆 Conquistas</button></li>
            <li class="nav-item"><button class="nav-link" onclick="trocarAba('pdf', this)">📄 Exportar PDF</button></li>
            <li class="nav-item"><button class="nav-link" onclick="trocarAba('arvore', this)">🌳 Árvore Evolutiva</button></li>
        </ul>

        <div class="mt-3">
            <div class="tab-pane-manual" id="escala"></div>
            <div class="tab-pane-manual" id="deriva" style="display:none;"></div>
            <div class="tab-pane-manual" id="extincao" style="display:none;"></div>
            <div class="tab-pane-manual" id="icnofosseis" style="display:none;"></div>
            <div class="tab-pane-manual" id="fosseis" style="display:none;"></div>
            <div class="tab-pane-manual" id="massa" style="display:none;"></div>
            <div class="tab-pane-manual" id="quiz" style="display:none;"></div>
            <div class="tab-pane-manual" id="tempo" style="display:none;"></div>
            <div class="tab-pane-manual" id="clima" style="display:none;"></div>
            <div class="tab-pane-manual" id="conquistas" style="display:none;"></div>
            <div class="tab-pane-manual" id="pdf" style="display:none;"></div>
            <div class="tab-pane-manual" id="arvore" style="display:none;"></div>
        </div>
    </div>

    <!-- Controle manual das abas -->
    <script>
        function trocarAba(id, btn) {
            document.querySelectorAll('.tab-pane-manual').forEach(function(el) {
                el.style.display = 'none';
            });
            document.querySelectorAll('#paleo-tabs .nav-link').forEach(function(el) {
                el.classList.remove('active');
            });
            document.getElementById(id).style.display = 'block';
            btn.classList.add('active');
        }
    </script>

    <!-- Scripts -->
    <script src="js/data.js" defer></script>
    <script src="js/utils.js" defer></script>
    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
</body>
</html>
